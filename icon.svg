<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c23152;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="paper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e8e8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="paperShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="url(#bg)" stroke="#0f3460" stroke-width="3"/>

  <!-- Lobster/Robot Hand - 3 claws -->
  <g filter="url(#shadow)" transform="translate(60, 120)">
    <!-- Palm/base -->
    <rect x="20" y="30" width="60" height="40" rx="8" fill="url(#hand)" opacity="0.9"/>

    <!-- Main claw (center) -->
    <path d="M50 30 L50 0 L65 -10 L70 5 L60 20 L60 30" fill="url(#hand)" stroke="#a8324a" stroke-width="1"/>
    <path d="M50 0 L35 -10 L30 5 L40 20 L50 30" fill="url(#hand)" stroke="#a8324a" stroke-width="1"/>

    <!-- Left claw -->
    <path d="M30 30 L20 10 L10 5 L5 15 L15 25 L25 30" fill="url(#hand)" stroke="#a8324a" stroke-width="1" opacity="0.9"/>

    <!-- Right claw -->
    <path d="M70 30 L80 10 L90 5 L95 15 L85 25 L75 30" fill="url(#hand)" stroke="#a8324a" stroke-width="1" opacity="0.9"/>

    <!-- Arm segments -->
    <rect x="25" y="65" width="50" height="20" rx="4" fill="url(#hand)" opacity="0.85"/>
    <rect x="30" y="80" width="40" height="15" rx="3" fill="url(#hand)" opacity="0.8"/>
    <rect x="35" y="90" width="30" height="25" rx="3" fill="url(#hand)" opacity="0.7"/>

    <!-- Joint details -->
    <circle cx="50" cy="35" r="3" fill="#fff" opacity="0.4"/>
    <circle cx="40" cy="70" r="2" fill="#fff" opacity="0.3"/>
    <circle cx="60" cy="70" r="2" fill="#fff" opacity="0.3"/>
  </g>

  <!-- Paper Airplane -->
  <g filter="url(#paperShadow)" transform="translate(140, 45) rotate(25)">
    <!-- Main body -->
    <path d="M0 0 L60 30 L20 35 L0 0" fill="url(#paper)" stroke="#bbb" stroke-width="1"/>
    <!-- Fold line -->
    <path d="M0 0 L30 17.5" fill="none" stroke="#ccc" stroke-width="1" opacity="0.6"/>
    <!-- Bottom wing -->
    <path d="M20 35 L60 30 L40 50 L20 35" fill="url(#paper)" stroke="#bbb" stroke-width="1" opacity="0.9"/>
    <!-- Shadow on wing -->
    <path d="M20 35 L40 42 L30 35" fill="#ddd" opacity="0.3"/>
  </g>

  <!-- Motion trails (from hand to airplane) -->
  <g opacity="0.4">
    <path d="M120 130 Q135 110 145 90" fill="none" stroke="#e94560" stroke-width="2" stroke-dasharray="4,4"/>
    <path d="M115 125 Q130 105 140 85" fill="none" stroke="#e94560" stroke-width="1.5" stroke-dasharray="3,5" opacity="0.6"/>
    <path d="M125 135 Q140 115 150 95" fill="none" stroke="#e94560" stroke-width="1" stroke-dasharray="2,6" opacity="0.4"/>
  </g>

  <!-- Sparkle effects -->
  <g fill="#ffd700" opacity="0.7">
    <polygon points="180,60 182,55 184,60 189,62 184,64 182,69 180,64 175,62" transform="scale(0.8)"/>
    <polygon points="200,80 201,77 202,80 205,81 202,82 201,85 200,82 197,81" transform="scale(0.6)"/>
  </g>

  <!-- Subtle tech lines -->
  <g stroke="#0f3460" stroke-width="1" opacity="0.3">
    <line x1="20" y1="200" x2="60" y2="200"/>
    <line x1="20" y1="205" x2="45" y2="205"/>
    <line x1="196" y1="200" x2="236" y2="200"/>
    <line x1="211" y1="205" x2="236" y2="205"/>
  </g>
</svg>